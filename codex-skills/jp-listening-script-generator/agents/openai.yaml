interface:
  display_name: "JP Listening Script Generator"
  short_description: "Generate Japanese listening Markdown notes in this vault through the sibling ListenKit CLI."
  default_prompt: "Use $jp-listening-script-generator to turn one listening audio file into the vault's current 精听稿 Markdown note format through the sibling ListenKit CLI. Prefer a topic-bearing note title, create the note if it does not exist yet, and keep the final note focused on frontmatter, audio embed, 脚本, 可直接背的常用句, and 素材说明. Treat this as a two-phase workflow: first generate the draft note, then immediately perform a second editing phase where you read the full script, use model judgment to choose 0-5 truly reusable sentences for `可直接背的常用句`, sync `daily_use_sentences`, reject overly generic filler such as `〜は〜です`, and preserve existing second-phase manual edits unless the user explicitly asks to reset them. Do not proactively open multiple sample notes just to match style; trust the generator's existing structure first, and only inspect one nearest sample note when the generated result is clearly unstable or ambiguous. `Shadowing_*` paths currently default to faster-whisper for engine selection, but the dialogue template itself is content-based: if the transcript clearly shows short question/answer or response turn-taking, render speaker labels conservatively as `A：/B：`; if the structure is ambiguous, keep normal non-speaker formatting and do not invent extra speakers. For short-choice materials such as `実力アップ/xx番-yy番`, rely on the generator's automatic short-choice mode, which prefers keeping question numbers and three-option structure, retries with a slow-copy pass when useful, and keeps an existing stronger script instead of overwriting it with a weaker retranscription. Long sentences are acceptable, and leaving the section empty is acceptable."

policy:
  allow_implicit_invocation: true
