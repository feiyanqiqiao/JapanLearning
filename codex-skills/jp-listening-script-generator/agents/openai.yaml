interface:
  display_name: "JP Listening Script Generator"
  short_description: "Create fixed 泛听 or 精听 listening-practice notes from one local audio file or media URL."
  default_prompt: >-
    Use $jp-listening-script-generator to turn one local listening audio file or media URL into the vault's current listening-practice Markdown note format through the sibling ListenKit CLI. Default to `--listening-mode extensive` 泛听 unless the user explicitly requests 精听 or the existing note already has `listening_mode: intensive` / `## 精听学习包`; use `--listening-mode intensive` for learning-block 精听. Store learning notes at the material-directory root, playable source audio and learning-block clips under `attach/`, and raw ListenKit plus slice-manifest artifacts under `artifacts/`. Before generation, ensure the offline dictionary cache is ready with `python3 tools/listening-transcribe-official/setup_offline_dictionary.py --check`. In 泛听, do not render `## 精听学习包` or slices; inline known accents inside `## 脚本`. In 精听, render `## 精听学习包` before the plain `## 脚本`; each block is `### SNN`, accent-marked text, and a real `![[attach/audio_stem_SNN.m4a]]` embed. General intensive material defaults to one natural sentence per block. Numbered `Shadowing_*` material defaults to one complete dialogue group per block, excluding the spoken group number. Use `--slice-manifest PATH` when AI or human review must override automatic time ranges. Let ListenKit `cli/export-audio-slices.py` export clips from the manifest; do not call raw `ffmpeg` directly. An intensive note containing `（语音切片待生成）`, missing embeds, or missing slice files is incomplete. Before finishing, verify that frontmatter `segment_count`, `### SNN` blocks, embeds, and real non-empty slice files all match. Do not write 本地候选 values back as confirmed vocab accents. Treat common-sentence selection as a second phase: choose 0-5 truly reusable sentences, render each as `原句` / `可替换骨架` / `使用场景` / `选入理由` without Chinese translation, sync `daily_use_sentences`, and preserve existing manual edits unless explicitly reset.

policy:
  allow_implicit_invocation: true
